name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
      continue-on-error: true
    
    - name: Start MySQL
      uses: mirromutth/mysql-action@v1.1
      with:
        mysql version: '5.7'
        mysql database: 'xtest_db'
        mysql user: 'test_user'
        mysql password: 'test_password'
    
    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h "127.0.0.1" --silent; do
          echo "Waiting for MySQL..."
          sleep 1
        done
    
    - name: Setup environment
      run: |
        echo "DB_HOST=127.0.0.1" >> .env
        echo "DB_USER=test_user" >> .env
        echo "DB_PASSWORD=test_password" >> .env
        echo "DB_NAME=xtest_db" >> .env
        echo "JWT_SECRET=test_secret_key_for_ci" >> .env
        echo "PORT=3000" >> .env
    
    - name: Run server test
      run: timeout 10s npm start || true
