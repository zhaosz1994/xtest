<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索功能测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .error {
            color: #dc3545;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }
        .success {
            color: #28a745;
            background: #e6ffe6;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 全局搜索功能测试</h1>
    
    <div class="test-box">
        <h3>1. 登录测试</h3>
        <input type="text" id="username" placeholder="用户名" value="admin">
        <input type="password" id="password" placeholder="密码" value="admin123" style="margin-top: 10px;">
        <button onclick="testLogin()">登录</button>
        <div id="login-result"></div>
    </div>
    
    <div class="test-box">
        <h3>2. 搜索测试</h3>
        <input type="text" id="keyword" placeholder="搜索关键词" value="测试">
        <button onclick="testSearch()" style="margin-right: 10px;">搜索</button>
        <button onclick="testSearch('testplan')">只搜测试计划</button>
        <button onclick="testSearch('case')">只搜测试用例</button>
        <button onclick="testSearch('post')">只搜帖子</button>
        <div id="search-result"></div>
    </div>
    
    <script>
        let authToken = '';
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('login-result');
            
            resultDiv.innerHTML = '<div class="success">登录中...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ 登录成功<br>
                            用户: ${data.user.username}<br>
                            角色: ${data.user.role}<br>
                            Token: ${data.token.substring(0, 20)}...
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ 登录失败: ${data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        async function testSearch(types = 'all') {
            if (!authToken) {
                document.getElementById('search-result').innerHTML = 
                    '<div class="error">❌ 请先登录</div>';
                return;
            }
            
            const keyword = document.getElementById('keyword').value;
            const resultDiv = document.getElementById('search-result');
            
            if (!keyword || keyword.length < 2) {
                resultDiv.innerHTML = '<div class="error">❌ 关键词至少需要2个字符</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="success">搜索中...</div>';
            
            try {
                const url = `http://localhost:3000/api/search?keyword=${encodeURIComponent(keyword)}&types=${types}`;
                console.log('请求URL:', url);
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                console.log('响应状态:', response.status);
                
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (data.success) {
                    const total = data.meta.totalResults;
                    const time = data.meta.searchTime;
                    
                    let html = `
                        <div class="success">
                            ✅ 搜索成功<br>
                            总结果: ${total} 条<br>
                            耗时: ${time}ms
                        </div>
                    `;
                    
                    if (data.data.testPlans && data.data.testPlans.total > 0) {
                        html += `<h4>测试计划 (${data.data.testPlans.total})</h4>`;
                        html += '<pre>' + JSON.stringify(data.data.testPlans.items, null, 2) + '</pre>';
                    }
                    
                    if (data.data.testCases && data.data.testCases.total > 0) {
                        html += `<h4>测试用例 (${data.data.testCases.total})</h4>`;
                        html += '<pre>' + JSON.stringify(data.data.testCases.items, null, 2) + '</pre>';
                    }
                    
                    if (data.data.posts && data.data.posts.total > 0) {
                        html += `<h4>论坛帖子 (${data.data.posts.total})</h4>`;
                        html += '<pre>' + JSON.stringify(data.data.posts.items, null, 2) + '</pre>';
                    }
                    
                    if (data.data.comments && data.data.comments.total > 0) {
                        html += `<h4>评论 (${data.data.comments.total})</h4>`;
                        html += '<pre>' + JSON.stringify(data.data.comments.items, null, 2) + '</pre>';
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            ❌ 搜索失败<br>
                            ${JSON.stringify(data.error, null, 2)}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('搜索错误:', error);
                resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        // 自动登录
        window.onload = () => {
            testLogin();
        };
    </script>
</body>
</html>
