<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模态框测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .test-btn {
            padding: 12px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        
        .test-btn:hover {
            background: #40a9ff;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 99999 !important;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: #fff;
            margin: auto;
            padding: 0;
            border: 1px solid #888;
            width: 600px;
            max-width: 90%;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100000 !important;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            color: #1f2937;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #f0f0f0;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>模态框功能测试</h1>
    <p>点击下面的按钮测试模态框是否正常显示</p>
    
    <button class="test-btn" onclick="testModal1()">测试1: 基础模态框</button>
    <button class="test-btn" onclick="testModal2()">测试2: 强制样式模态框</button>
    <button class="test-btn" onclick="testModal3()">测试3: 极简模态框</button>
    
    <div class="result" id="result"></div>
    
    <script>
        function log(message) {
            const result = document.getElementById('result');
            result.innerHTML += `<p>${message}</p>';
            console.log(message);
        }
        
        function testModal1() {
            log('测试1: 创建基础模态框...');
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'test-modal-1';
            modal.style.cssText = 'display: flex; z-index: 99999;';
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>测试模态框 1</h3>
                        <button class="modal-close" onclick="closeModal('test-modal-1')">&times;</button>
                    </div>
                    <div class="modal-body">
                        <p>这是基础模态框测试</p>
                        <p>如果你能看到这个模态框，说明基础功能正常</p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeModal('test-modal-1')">关闭</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            log('模态框已添加到DOM');
            
            // 检查模态框状态
            setTimeout(() => {
                const checkModal = document.getElementById('test-modal-1');
                log(`模态框存在: ${!!checkModal}`);
                log(`模态框display: ${checkModal ? window.getComputedStyle(checkModal).display : '不存在'}`);
            }, 100);
        }
        
        function testModal2() {
            log('测试2: 创建强制样式模态框...');
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'test-modal-2';
            modal.style.cssText = 'display: flex !important; position: fixed !important; z-index: 999999 !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background-color: rgba(255, 0, 0, 0.8) !important; align-items: center !important; justify-content: center !important;';
            
            modal.innerHTML = `
                <div class="modal-content" style="background: white !important; padding: 40px !important;">
                    <h2>测试模态框 2</h2>
                    <p>这是强制样式模态框测试</p>
                    <p>背景是红色，如果你能看到，说明强制样式有效</p>
                    <button class="btn btn-primary" onclick="closeModal('test-modal-2')">关闭</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            log('强制样式模态框已添加到DOM');
        }
        
        function testModal3() {
            log('测试3: 创建极简模态框...');
            
            const modal = document.createElement('div');
            modal.id = 'test-modal-3';
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 255, 0, 0.8); z-index: 9999999; display: flex; align-items: center; justify-content: center;';
            
            modal.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 8px; text-align: center;">
                    <h2>测试模态框 3</h2>
                    <p>这是极简模态框测试</p>
                    <p>背景是绿色，如果你能看到，说明模态框可以正常显示</p>
                    <button onclick="closeModal('test-modal-3')" style="padding: 10px 20px; background: #1890ff; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px;">关闭</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            log('极简模态框已添加到DOM');
        }
        
        function closeModal(id) {
            const modal = document.getElementById(id);
            if (modal) {
                modal.remove();
                log(`模态框 ${id} 已关闭`);
            }
        }
        
        log('页面加载完成，点击按钮开始测试');
    </script>
</body>
</html>
